spring:
  application:
    name: backend

  datasource:
    url: jdbc:postgresql://localhost:5432/jobpilot_secure
    username: jobpilot_user
    password: jobpilot_password
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080